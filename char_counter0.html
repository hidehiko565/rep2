<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>文字数カウンター（超過分を赤表示）</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --text: #e6e9f0;
      --muted: #aab3c5;
      --accent: #4da3ff;
      --danger: #ff5a5f;
      --border: #223055;
    }
    html, body {
      height: 100%;
      background: radial-gradient(1200px 800px at 10% 10%, #0f1730 0%, #0b1020 60%, #090c18 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, Arial, sans-serif;
      margin: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .title {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      letter-spacing: .2px;
      margin: 4px 0 20px;
      background: linear-gradient(90deg, #fff 0%, #cfe7ff 50%, #9cd1ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
    }
    .input, .textarea, .panel {
      background: linear-gradient(180deg, rgba(18,26,47,.9), rgba(14,20,38,.9));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.02),
        0 10px 30px rgba(7,10,25,.25);
    }
    .input {
      padding: 10px 12px;
      width: 160px;
    }
    .input:focus, .textarea:focus {
      border-color: var(--accent);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.02),
        0 0 0 3px rgba(77,163,255,.15),
        0 10px 30px rgba(7,10,25,.35);
    }
    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
      justify-content: flex-end;
      align-items: center;
    }
    .chip {
      background: rgba(77,163,255,.12);
      color: #cfe6ff;
      padding: 4px 10px;
      border: 1px solid rgba(77,163,255,.35);
      border-radius: 999px;
      font-variant-numeric: tabular-nums;
    }
    .chip.danger {
      background: rgba(255,90,95,.12);
      color: #ffd7d8;
      border-color: rgba(255,90,95,.35);
    }
    .workbench {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }
    .textarea {
      min-height: 320px;
      padding: 14px 16px;
      font: 14px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      resize: vertical;
    }
    .panel {
      min-height: 320px;
      padding: 14px 16px;
      overflow: auto;
      white-space: pre-wrap;     /* 改行維持 */
      word-wrap: break-word;
      word-break: break-word;    /* 長い連結語も折返し */
      font: 14px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    .exceed {
      color: var(--danger);
      text-decoration-color: rgba(255,90,95,.4);
      text-decoration-thickness: .08em;
    }
    .footer-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .workbench { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .stats { justify-content: flex-start; }
      .input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">文字数カウンター（超過分を赤表示）</h1>

    <div class="controls">
      <div class="field">
        <label class="label" for="limitInput">設定文字数</label>
        <input id="limitInput" class="input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="例：400" value="400" aria-describedby="limitHelp" />
      </div>
      <div class="stats" aria-live="polite">
        <span class="chip" id="currentCount">現在：0 文字</span>
        <span class="chip" id="limitCount">上限：400 文字</span>
        <span class="chip danger" id="overInfo" style="display:none;">超過：0 文字</span>
      </div>
    </div>

    <div class="workbench">
      <textarea id="source" class="textarea" placeholder="ここにテキストを入力してください（改行・スペースをそのままプレビューに反映します）"></textarea>
      <div id="preview" class="panel" aria-label="プレビュー（超過分は赤で表示）"></div>
    </div>

    <div class="footer-note">
      ※ テキストエリア内の一部着色は仕様上できないため、右側のプレビューで超過文字を赤く表示します。
    </div>
  </div>

<script>
  (function () {
    const $ = (sel) => document.querySelector(sel);
    const source = $("#source");
    const limitInput = $("#limitInput");
    const currentCount = $("#currentCount");
    const limitCount = $("#limitCount");
    const overInfo = $("#overInfo");
    const preview = $("#preview");

    const DEFAULT_LIMIT = 400;

    function toIntSafe(v, fallback) {
      const n = parseInt(String(v).replace(/[^\d]/g, ""), 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function escapeHTML(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    // --- ここから追加：改行を0文字として扱うロジック ---

    // カウント：改行(\r, \n)を除いて数える
    function countExcludingNewlines(text) {
      // サロゲートペア対応を望むなら Array.from(text.replace(...)).length を使用
      return text.replace(/\r?\n/g, "").length;
    }

    // 上限位置で可視テキストを2分割（改行はカウントしない）
    // 戻り値: { head, tail }（どちらも「元の文字列」基準）
    function splitByLimitExcludingNewlines(text, limit) {
      if (limit <= 0) {
        return { head: "", tail: text };
      }
      let count = 0;
      let splitIndex = text.length; // デフォは末尾
      // コードポイントで走査（絵文字等を1単位にしたい場合）
      const codePoints = Array.from(text);
      let i = 0;
      for (; i < codePoints.length; i++) {
        const ch = codePoints[i];
        const isNewline = ch === "\n" || ch === "\r";
        // 改行はカウントしないが、表示上は残す
        if (!isNewline) {
          if (count + 1 > limit) {
            break;
          }
          count++;
        }
      }
      // i は codePoints のインデックス。元の文字列インデックスに変換する
      // Array.from で分割した配列を結合して得た長さは、元文字列の「UTF-16単位」ではなく「コードポイント長」。
      // ここでは安全に「前方のコードポイントを再結合して length を確定」する。
      const headByCodePoints = codePoints.slice(0, i).join("");
      splitIndex = headByCodePoints.length;

      return {
        head: text.slice(0, splitIndex),
        tail: text.slice(splitIndex),
      };
    }

    // --- ここまで追加 ---

    function render() {
      const text = source.value || "";
      const limit = toIntSafe(limitInput.value, DEFAULT_LIMIT);

      // 改行を0文字として扱ったカウント
      const count = countExcludingNewlines(text);
      const over = Math.max(0, count - limit);

      currentCount.textContent = `現在：${count} 文字（※改行は0文字としてカウント）`;
      limitCount.textContent = `上限：${limit} 文字`;
      overInfo.style.display = over > 0 ? "" : "none";
      overInfo.textContent = `超過：${over} 文字`;

      // プレビュー：改行は見た目に残しつつ、超過境界は「改行を除いた上限」で区切る
      const safe = escapeHTML(text);
      if (over > 0) {
        const { head, tail } = splitByLimitExcludingNewlines(text, limit);
        const safeHead = escapeHTML(head);
        const safeTail = escapeHTML(tail);
        preview.innerHTML = safeHead + `<span class="exceed">${safeTail}</span>`;
      } else {
        preview.innerHTML = safe;
      }
    }

    // 入力イベント
    source.addEventListener("input", render);

    // limit の入力は数字のみ許可（貼り付け含む）
    limitInput.addEventListener("input", () => {
      const filtered = limitInput.value.replace(/[^\d]/g, "");
      limitInput.value = filtered;
      render();
    });

    // 空のままフォーカスが外れたらデフォルトへ
    limitInput.addEventListener("blur", () => {
      if (limitInput.value.trim() === "") {
        limitInput.value = String(DEFAULT_LIMIT);
        render();
      }
    });

    // 初期描画
    render();
  })();
</script>
</body>
</html>
